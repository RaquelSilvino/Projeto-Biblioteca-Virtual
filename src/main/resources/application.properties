spring.application.name=Livraria

# Configuração do MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/livraria_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Dialeto do Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Mostrar SQL no console
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Configuração de Thymeleaf
spring.thymeleaf.cache=false

# Mudar a porta do servidor para 8081
server.port=8081