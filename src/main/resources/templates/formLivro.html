<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Livro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="layout :: sidebar"></div>

<div class="content">

    <h2>Cadastrar / Editar Livro</h2>

    <form th:action="@{/livros/salvar}"
          th:object="${livro}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Título</label>
            <input type="text" th:field="*{titulo}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Autor</label>
            <input type="text" th:field="*{autor}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Preço</label>
            <input type="number" step="0.01" th:field="*{preco}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Imagem do Livro</label>
            <input type="file" th:field="*{arquivoImagem}" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">
            Salvar
        </button>

    </form>

</div>

</body>
</html>
